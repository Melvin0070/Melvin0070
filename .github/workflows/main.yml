name: Generate Profile SVGs

on:
  schedule:
    - cron: "0 6 * * *"        # every day at 06:00 UTC
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate dark_mode.svg / light_mode.svg
        env:
          # GITHUB_TOKEN is provided automatically; it can read your public
          # repos, stars, followers and commit counts via the GraphQL API.
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: Melvin0070
        run: python3 today.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --cached || git commit -m "Update profile [skip ci]"
          git push
